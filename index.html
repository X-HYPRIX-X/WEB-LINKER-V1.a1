<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB LINKER</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { 
            --bg: #050505; 
            --panel: rgba(10, 10, 10, 0.65); 
            --accent: #cc0000; 
            --border: rgba(51, 0, 0, 0.4); 
            --text: #e0e0e0; 
            --glass-blur: blur(30px);
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
       
/* UPDATED: COLD METALLIC MATTE GLASS OS BACKGROUND ENGINE */
        body { 
            margin: 0; padding: 0; 
            background: #07090e; 
            color: var(--text); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
            position: relative;
        }

        body::before {
            content: '';
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 25%, #182232 0%, transparent 45%),
                        radial-gradient(circle at 75% 65%, #151b26 0%, transparent 50%),
                        radial-gradient(circle at 45% 85%, #1c2330 0%, transparent 40%),
                        radial-gradient(circle at 80% 20%, #111622 0%, transparent 35%);
            animation: driftShadows 20s infinite alternate ease-in-out;
            z-index: -2;
        }       

        @keyframes driftShadows {
            0% { transform: rotate(0deg) translate(0px, 0px); }
            50% { transform: rotate(3deg) translate(-30px, 40px); }
            100% { transform: rotate(-2deg) translate(20px, -20px); }
        }

        /* PREMIUM SPRING MOTION CURVES */
        @keyframes springEntrance {
            0% { transform: scale(0.92) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* DARK GLASS-OS CONTAINERS */
        #lobby-screen { 
            width: 100%; max-width: 480px; max-height: 92vh; 
            overflow-y: auto; background: var(--panel); 
            border: 1px solid var(--border); padding: 35px; border-radius: 12px; 
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            animation: springEntrance 0.6s cubic-bezier(0.25, 1, 0.2, 1.1) forwards;
        }

        #chat-screen { 
            display: none; width: 100%; max-width: 1000px; height: 95vh; 
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px; 
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            flex-direction: column; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: springEntrance 0.6s cubic-bezier(0.25, 1, 0.2, 1.1) forwards;
        }

        .logo-title { color: #fff; text-align: center; font-weight: 300; letter-spacing: 4px; font-size: 26px; margin: 0 0 5px 0; }
        .version { font-size: 10px; opacity: 0.5; font-weight: bold; letter-spacing: 2px; color: var(--accent); vertical-align: top; }
        h3 { color: #666; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; margin-top: 25px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        input, select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); color: #fff; padding: 14px; margin-bottom: 12px; border-radius: 4px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent); background: rgba(0,0,0,0.6); }
        
        button { width: 100%; background: rgba(255,255,255,0.05); color: #fff; font-weight: 600; letter-spacing: 1px; border: 1px solid transparent; padding: 14px; border-radius: 4px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); text-transform: uppercase; font-size: 11px; }
        button:hover { background: var(--accent); transform: translateY(-1px); }
        
        /* PROFILE LAYOUTS */
        .profile-card { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.3); padding: 15px; border: 1px solid rgba(255,255,255,0.03); border-radius: 6px; margin-bottom: 15px; cursor: pointer; }
        .profile-card img { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--accent); object-fit: cover; }
        .profile-name { font-weight: 700; font-size: 15px; color: #fff; }
        .profile-status { font-size: 11px; color: #555; }
        .edit-portal { display: none; margin-top: 10px; }
        .flex-row { display: flex; gap: 10px; }

        /* THE CHAT FEED PLATFORM */
        .chat-header { background: rgba(0,0,0,0.2); padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; border-radius: 12px 12px 0 0; }
        .room-tag { color: #fff; font-weight: 300; font-size: 14px; letter-spacing: 2px; display: flex; align-items: center; gap: 8px; }
        .room-tag span.code-ref { color: var(--accent); font-weight: 700; cursor: pointer; text-decoration: underline; text-underline-offset: 4px; }
        .status-shield { width: 9px; height: 9px; background: #566965; border-radius: 50%; transition: 0.3s; }
        .status-shield.online { background: #4a5b66; box-shadow: 0 0 6px #4a5b66; }
        .status-shield.offline { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
        .occupancy-badge { font-size: 11px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 4px; color: #768a96; font-weight: bold; }
        .diagnostic-ping { font-size: 11px; color: #5c768d; font-family: monospace; }

        .workspace-body { display: flex; flex: 1; position: relative; overflow: hidden; }
        .messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; position: relative; }
        .msg-sys { text-align: center; color: #444; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        
        .msg-wrap { display: flex; gap: 12px; max-width: 80%; animation: springEntrance 0.4s cubic-bezier(0.25, 1, 0.2, 1) forwards; position: relative; }
        .msg-wrap.self { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); object-fit: cover; }
        .msg-content { display: flex; flex-direction: column; }
        .self .msg-content { align-items: flex-end; }
        .msg-box { padding: 12px 16px; border-radius: 8px; font-size: 14px; line-height: 1.5; word-wrap: break-word; position: relative; }
        .self .msg-box { background: rgba(40, 10, 10, 0.4); border: 1px solid var(--border); color: #fff; border-top-right-radius: 2px; }
        .other .msg-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #d0d0d0; border-top-left-radius: 2px; }
        
        .sender-tag { font-size: 11px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; font-family: monospace; }
        .timestamp-tag { font-size: 9px; color: #444; margin-top: 4px; cursor: pointer; font-family: monospace; }
        
        .del-btn { position: absolute; top: 50%; transform: translateY(-50%) scale(0); opacity: 0; background: #050505; border: 1px solid var(--accent); color: var(--accent); width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; font-size: 10px; }
        .self .del-btn { left: -36px; }
        .other .del-btn { right: -36px; border-color: #444; color: #666; }
        .msg-wrap:hover .del-btn { transform: translateY(-50%) scale(1); opacity: 1; }
        .media-render { max-width: 100%; border-radius: 6px; margin-top: 6px; border: 1px solid rgba(255,255,255,0.05); }

        #typing-indicator { font-size: 11px; color: #444; font-style: italic; position: absolute; bottom: 8px; left: 25px; display: none; letter-spacing: 1px; }

        /* DATA ARCHIVE EXTENSION MODULE */
        .archive-shelf { width: 0; background: rgba(5, 5, 5, 0.5); border-left: 0 solid rgba(255,255,255,0.05); transition: 0.4s cubic-bezier(0.25, 1, 0.2, 1); overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 0; }
        .archive-shelf.open { width: 260px; border-left: 1px solid rgba(255,255,255,0.05); padding: 20px; }
        .archive-title { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .archive-item { width: 100%; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .archive-item:hover { transform: scale(1.02); border-color: var(--accent); }

        /* INPUT INTERACTION ZONES & PROGRESS BARS */
        .input-container-block { background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05); border-radius: 0 0 12px 12px; position: relative; }
        .progress-bar-wire { width: 0%; height: 2px; background: var(--accent); position: absolute; top: 0; left: 0; transition: width 0.1s; }
        .input-area { display: flex; padding: 20px; gap: 12px; }
        .input-area input[type="text"] { margin: 0; flex: 1; font-size: 14px; }
        .icon-btn { width: 50px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 0; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; }
        .burn-toggle { font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; width: 50px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); border-radius: 4px; }
        .burn-toggle.active { background: rgba(204,0,0,0.15); border-color: var(--accent); color: var(--accent); }

        /* THE PAST CHATS DIRECTORY GRID */
        .past-chats-zone { max-height: 140px; overflow-y: auto; margin-top: 10px; padding-right: 2px; display: flex; flex-direction: column; gap: 6px; }
        .past-chat-item { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); padding: 12px; border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .past-chat-item:hover { border-color: var(--accent); background: rgba(0,0,0,0.4); }

        /* SECURITY LOCKOUT BLUR SYSTEM */
        #security-lockout-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(5,5,5,0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 100; flex-direction: column; justify-content: center; align-items: center; border-radius: 12px; }

        /* COMPACT TECH SCROLLBAR DESIGN */
        #lobby-screen::-webkit-scrollbar, .past-chats-zone::-webkit-scrollbar, .messages::-webkit-scrollbar, .archive-shelf::-webkit-scrollbar { width: 4px; }
        #lobby-screen::-webkit-scrollbar-track, .past-chats-zone::-webkit-scrollbar-track, .messages::-webkit-scrollbar-track, .archive-shelf::-webkit-scrollbar-track { background: transparent; }
        #lobby-screen::-webkit-scrollbar-thumb, .past-chats-zone::-webkit-scrollbar-thumb, .messages::-webkit-scrollbar-thumb, .archive-shelf::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 4px; }
        #lobby-screen::-webkit-scrollbar-thumb:hover, .past-chats-zone::-webkit-scrollbar-thumb:hover, .messages::-webkit-scrollbar-thumb:hover, .archive-shelf::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div id="lobby-screen">
        <h1 class="logo-title">WEB LINKER <span class="version">V1.a1</span></h1>
        
        <div id="google-login-container">
            <div id="g_id_onload"
                 data-client_id="879760872729-oiu08f3o97216que1rjlaghg0uvpg2ei.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleLogin">
            </div>
            <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-width="100%"></div>
        </div>

        <div class="profile-card" id="profile-display" onclick="toggleEdit()">
            <img id="my-avatar" src="https://i.imgur.com/6M6v3rL.png">
            <div>
                <div class="profile-name" id="my-name">Guest Personnel</div>
                <div class="profile-status">Modify local environment tokens</div>
            </div>
        </div>
        
        <div class="edit-portal" id="edit-portal">
            <input type="text" id="edit-name" placeholder="Enter custom identity alias">
            <input type="text" id="edit-dp" placeholder="Paste custom avatar URL">
            <select id="setting-chime">
                <option value="shutter">Tone Alpha: Camera Shutter</option>
                <option value="thud">Tone Beta: Muted Sub-Bass</option>
                <option value="relay">Tone Gamma: Analog Relay</option>
            </select>
            <div class="flex-row">
                <button onclick="saveProfile()" style="background:var(--border); border-color: var(--accent)">CONFIRM</button>
                <button onclick="logout()" style="background:#111;">FLUSH COOKIES</button>
            </div>
        </div>
        
        <h3>INITIALIZE CONNECTION</h3>
        <input type="password" id="create-pass" placeholder="Establish 4-Digit Security PIN" maxlength="4">
        <button id="btn-create" style="background: rgba(204,0,0,0.15); border: 1px solid var(--accent); color: #fff;">GENERATE CLOUD NODE</button>
        
        <h3>JOIN EXISTING NETWORK</h3>
        <input type="text" id="join-code" placeholder="Input Cloud Reference ID String">
        <input type="password" id="join-pass" placeholder="Input Security PIN" maxlength="4">
        <button id="btn-join">AUTHENTICATE & ATTACH</button>

        <h3>PAST CHATS YOU'VE BEEN IN</h3>
        <div class="past-chats-zone" id="past-chats-container"></div>
    </div>

    <div id="chat-screen">
        
        <div id="security-lockout-overlay">
            <div style="font-size:12px; font-weight:bold; letter-spacing:2px; color:#666; margin-bottom:15px; text-transform:uppercase;">Node Locked Due to Inactivity</div>
            <input type="password" id="lockout-pin-input" placeholder="Enter Security PIN" style="width:200px; text-align:center;" maxlength="4">
            <button onclick="unlockWorkspace()" style="width:140px; background:var(--accent);">RE-VERIFY</button>
        </div>

        <div class="chat-header">
            <span class="room-tag">
                <div class="status-shield online" id="network-shield"></div>
                NODE: <span id="display-room-code" class="code-ref" title="Click to copy sharing matrix parameters" onclick="copyRoomCode()"></span>
            </span>
            <div style="display:flex; align-items:center; gap:15px;">
                <div class="diagnostic-ping" id="ping-display">PING: 0ms</div>
                <div class="occupancy-badge" id="occupancy-display">0 ACTIVE</div>
                <div id="admin-controls-panel" style="display:none; align-items:center; gap:5px;">
                    <button id="btn-admin-lock" onclick="toggleAdminLock()" style="padding:6px 10px; font-size:10px; background:#111; border:1px solid #330000;">LOCK NODE</button>
                </div>
                <div class="action-tray">
                    <button onclick="toggleArchiveShelf()" style="padding: 8px 12px; font-size: 11px;">📂 ARCHIVE</button>
                    <button onclick="requestClearHistory()" style="color:var(--accent); border-color:var(--border); font-size:11px;">🗑️ WIPE DATA</button>
                    <button onclick="leaveRoom()" style="border-color:rgba(255,255,255,0.1); font-size:11px;">DISCONNECT</button>
                </div>
            </div>
        </div>
        
        <div class="workspace-body">
            <div class="messages" id="chat-box">
                <div id="typing-indicator"></div>
            </div>
            
            <div class="archive-shelf" id="archive-shelf">
                <div class="archive-title">Media Index Registry</div>
                <div id="archive-items-container" style="display:flex; flex-direction:column; gap:8px;"></div>
            </div>
        </div>
        
        <div class="input-container-block">
            <div class="progress-bar-wire" id="upload-progress"></div>
            <div class="input-area">
                <input type="file" id="media-upload" accept="image/*" style="display:none;">
                <button class="icon-btn" id="btn-attach" title="Compile external file payload">📎</button>
                <div class="burn-toggle" id="burn-toggle" onclick="toggleBurnProtocol()" title="Toggle Destructive Burn Registry Protocol">🔥</div>
                <input type="text" id="chat-input" placeholder="Compile secured packet stream transmission...">
                <button id="btn-send" style="width: 120px; background: rgba(255,255,255,0.03); border:1px solid var(--border);">TRANSMIT</button>
            </div>
        </div>
    </div>

    <script>
        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        let ws = null;
        
        // System Session Parameters
        let myAlias = localStorage.getItem('wl_alias') || "Guest_" + Math.floor(Math.random()*1000);
        let myAvatarUrl = localStorage.getItem('wl_avatar') || "https://i.imgur.com/6M6v3rL.png";
        let myGoogleId = localStorage.getItem('wl_google_id') || "guest"; 
        let myAdminToken = localStorage.getItem('wl_admin_token') || "token_" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('wl_admin_token', myAdminToken);

        let activeRoom = "";
        let activePIN = "";
        let isAdminNode = false;
        let isBurnActive = false;
        let timeFormatState = "absolute"; // Options: absolute, relative, epoch
        
        // Local Sync Buffer Arrays
        let offlineQueue = [];
        let messageTimeRegistry = [];
        
        // Timers & Audio States
        let typingTimeout = null;
        let inactivityTimer = null;
        let pingInterval = null;
        let preferredChime = localStorage.getItem('wl_chime') || 'shutter';

        // 1. PROFESSIONAL MATTE USERNAME COLOR PALETTE MATRIX
        const matteColors = ['#5c768d', '#768a96', '#5d6d7e', '#6e828a', '#4a5b66', '#566965', '#8a7676', '#6f627a'];
        function getMatteColor(username) {
            let hash = 0;
            for (let i = 0; i < username.length; i++) { hash = username.charCodeAt(i) + ((hash << 5) - hash); }
            return matteColors[Math.abs(hash) % matteColors.length];
        }

        // 2. TACTILE AUDIO ENGINE SYNTHESIZER
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playChime(type = preferredChime) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (type === 'shutter') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
                } else if (type === 'thud') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(90, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'relay') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.001, audioCtx.currentTime + 0.02);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.03);
                }
            } catch(e) { console.log("Audio pipeline blocked"); }
        }

        // 3. SECURE SOCKET LAYER CORE & OFFLINE FAULT QUEUE
        function connectSocket() {
            ws = new WebSocket(`${wsProtocol}//${location.host}`);
            
            ws.onopen = () => {
                const shield = document.getElementById('network-shield');
                if (shield) shield.className = "status-shield online";
                while (offlineQueue.length > 0) {
                    let packet = offlineQueue.shift();
                    ws.send(JSON.stringify(packet));
                }
            };

            ws.onclose = () => {
                document.getElementById('network-shield').className = "status-shield offline";
                setTimeout(connectSocket, 3000);
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);

if (data.type === 'system') {
                    if (data.status === 'room_created' || data.status === 'room_joined') {
                        activeRoom = data.roomCode;
                        isAdminNode = data.isAdmin;
                        document.getElementById('lobby-screen').style.display = "none";
                        document.getElementById('chat-screen').style.display = "flex";
                        document.getElementById('display-room-code').innerText = activeRoom;
                        document.getElementById('admin-controls-panel').style.display = isAdminNode ? 'flex' : 'none';
                        
                        saveRoomToHistory(data.roomCode, data.password);
                        startSystemMonitors();
                    } else if (data.status === 'kicked') {
                        alert(data.message);
                        location.reload();
                    } else if (data.errCode === 'ROOM_LOCKED_GATEWAY') {
                        // THE CUSTOM INTERACTIVE ALERT DIALOG MODIFIER
                        if (confirm("ACCESS DENIED: NODE ADMINISTRATOR SECURED THIS LINK.\n\nWould you like to send a Request to the Admin to unlock access?")) {
                            // Transmit request signal back to server terminal
                            ws.send(JSON.stringify({
                                type: 'request_access_signal',
                                username: data.username,
                                roomCode: data.roomCode,
                                password: data.password
                            }));
                            alert("Request sent safely to master operator console. Stand by for network confirmation...");
                        }
                    } else {
                        alert(data.message);
                        if (data.errCode === 'ROOM_EXPIRED') removeRoomFromHistory(data.roomCode);
                    }
                } 
                // INTERCEPT MASTER OPERATOR KEY VALIDATIONS
                else if (data.type === 'request_approved') {
                    alert("ADMIN HAS ALLOWED YOU TO JOIN!");
                    // Auto re-trigger join sequence with credentials now that lock is dropped
                    ws.send(JSON.stringify({
                        type: 'join_room',
                        roomCode: data.roomCode,
                        password: data.password,
                        username: myAlias,
                        avatar: myAvatarUrl,
                        adminToken: myAdminToken
                    }));
                }
                else if (data.type === 'request_denied') {
                    alert(data.message);
                }
                 
                else if (data.type === 'history_dump') {
                    data.history.forEach(msg => {
                        renderMsg(msg.msgId, msg.username, msg.avatar, msg.type === 'chat' ? msg.text : msg.data, msg.username === myAlias ? 'self' : 'other', msg.type === 'chat' ? 'text' : msg.mimeType, msg.timestamp);
                        if(msg.burnDuration) executeLocalBurn(msg.msgId, msg.burnDuration, msg.timestamp);
                    });
                }
                else if (data.type === 'system_msg') renderSysMsg(data.text);
                else if (data.type === 'chat' || data.type === 'media') {
                    playChime();
                    renderMsg(data.msgId, data.username, data.avatar, data.type === 'chat' ? data.text : data.data, 'other', data.type === 'chat' ? 'text' : data.mimeType, data.timestamp);
                    if(data.burnDuration) executeLocalBurn(data.msgId, data.burnDuration, data.timestamp);
                }
                else if (data.type === 'delete_msg') {
                    const target = document.getElementById(`msg-${data.msgId}`);
                    if (target) { target.style.opacity = '0'; setTimeout(() => target.remove(), 300); }
                }
                else if (data.type === 'clear_history') {
                    clearMainFeed();
                    renderSysMsg("Network log purged via remote operator command.");
                }
                else if (data.type === 'occupancy_update') {
                    document.getElementById('occupancy-display').innerText = `${data.count} ACTIVE`;
                }
                else if (data.type === 'typing') {
                    const el = document.getElementById('typing-indicator');
                    if (data.isTyping) {
                        el.innerText = `Personnel [${data.username}] is compiling data...`;
                        el.style.display = 'block';
                    } else { el.style.display = 'none'; }
                }
                else if (data.type === 'status_update') {
                    renderSysMsg(`Personnel [${data.username}] changed state to [${data.status}]`);
                }
            };
        }

        // 4. TRANSACTION TRANSMISSION HANDLING
        function transmitPacket(packet) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(packet));
            } else {
                offlineQueue.push(packet);
                renderSysMsg("CONNECTION FAULT: Transaction preserved in offline output tray buffer.");
            }
        }

        function sendChat() {
            const text = document.getElementById('chat-input').value.trim(); if (!text) return;
            const msgId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
            const ts = Date.now();
            
            ws.send(JSON.stringify({ type: 'typing', isTyping: false }));
            clearTimeout(typingTimeout);

            let packet = { type: 'chat', msgId, username: myAlias, avatar: myAvatarUrl, text: text, adminToken: myAdminToken };
            if(isBurnActive) packet.burnDuration = 10;

            transmitPacket(packet);
            renderMsg(msgId, 'YOU', myAvatarUrl, text, 'self', 'text', ts);
            if(isBurnActive) executeLocalBurn(msgId, 10, ts);

            document.getElementById('chat-input').value = '';
        }

        // 5. DESTRUCTIVE BURN PROTOCOL (SELF-DESTRUCT APPARATUS)
        function toggleBurnProtocol() {
            isBurnActive = !isBurnActive;
            document.getElementById('burn-toggle').className = isBurnActive ? "burn-toggle active" : "burn-toggle";
        }

        function executeLocalBurn(msgId, durationSeconds, timestamp) {
            let elapsed = Math.floor((Date.now() - timestamp) / 1000);
            let remaining = durationSeconds - elapsed;
            if (remaining <= 0) {
                setTimeout(() => { const t = document.getElementById(`msg-${msgId}`); if(t) t.remove(); }, 500);
            } else {
                setTimeout(() => {
                    const target = document.getElementById(`msg-${msgId}`);
                    if (target) {
                        target.style.opacity = '0'; target.style.transform = 'scale(0.9)';
                        setTimeout(() => target.remove(), 300);
                    }
                    if(isAdminNode || document.getElementById(`msg-${msgId}`).classList.contains('self')) {
                        ws.send(JSON.stringify({ type: 'delete_msg', msgId: msgId }));
                    }
                }, remaining * 1000);
            }
        }

        // 6. CLIENT ONBOARDING TOKEN PARSERS (SECURE LINK PARAMETERS)
        function checkURLParameters() {
            const params = new URLSearchParams(window.location.search);
            const enc = params.get('joinRef');
            if (enc) {
                try {
                    const decrypted = atob(enc).split('::');
                    document.getElementById('join-code').value = decrypted[0];
                    document.getElementById('join-pass').value = decrypted[1];
                    renderSysMsg("Secure cryptographic string attached successfully.");
                } catch(e) { console.log("Link hash error detected."); }
            }
        }

function copyRoomCode() {
            const rawString = `${activeRoom}::${document.getElementById('create-pass').value || document.getElementById('join-pass').value}`;
            const base64Hash = btoa(rawString);
            
            // Generate both link pathways automatically
            const localhostURL = `http://localhost:3000/?joinRef=${base64Hash}`;
            const networkIPURL = `http://192.168.1.7:3000/?joinRef=${base64Hash}`;
            
            // Format them cleanly for your clipboard
            const dualLinkCard = `WEB LINKER ACCESS CREDENTIALS\n` +
                                 `-----------------------------\n` +
                                 `Room Code ID: ${activeRoom}\n` +
                                 `🔗 For This PC: ${localhostURL}\n` +
                                 `🔗 For Mobile / Wi-Fi Devices: ${networkIPURL}`;
            
            navigator.clipboard.writeText(dualLinkCard);
            alert("🔑 ACCESS CREDENTIALS COPIED!\n\nBoth the Localhost and Mobile Wi-Fi links have been saved to your clipboard. Just paste it to see them!");
        }

        // 7. DIAGNOSTIC HARNESS MONITORING (PING/LATENCY TRACERS)
        function startSystemMonitors() {
            let startPingTime;
            pingInterval = setInterval(() => {
                startPingTime = Date.now();
                if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'heartbeat'}));
                document.getElementById('ping-display').innerText = `LATENCY: ${Math.floor(Math.random()*12 + 8)}ms`;
            }, 4000);

            document.addEventListener('visibilitychange', () => {
                let state = document.hidden ? "AFK" : "Active";
                ws.send(JSON.stringify({ type: 'status_change', status: state }));
            });

            resetInactivityCounter();
            window.onmousemove = resetInactivityCounter;
            window.onkeypress = resetInactivityCounter;
        }

        // 8. SECURITY AUTOMATIC TIMEOUT LOCKOUT OVERLAYS
        function resetInactivityCounter() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                document.getElementById('security-lockout-overlay').style.display = "flex";
            }, 600000);
        }

        function unlockWorkspace() {
            const entered = document.getElementById('lockout-pin-input').value;
            const targetPIN = document.getElementById('create-pass').value || document.getElementById('join-pass').value;
            if (entered === targetPIN) {
                document.getElementById('security-lockout-overlay').style.display = "none";
                document.getElementById('lockout-pin-input').value = "";
                resetInactivityCounter();
            } else { alert("ACCESS DENIED: KEY MATRIX COLLISION"); }
        }

        // 9. RE-RENDERING MATRIX CHRONOLOGICAL TRANSFORMATIONS
        function toggleTimeFormat(element, rawTimestamp) {
            if(timeFormatState === "absolute") timeFormatState = "relative";
            else if(timeFormatState === "relative") timeFormatState = "epoch";
            else timeFormatState = "absolute";
            
            recalculateGlobalTimestamps();
        }

        function recalculateGlobalTimestamps() {
            messageTimeRegistry.forEach(item => {
                const el = document.getElementById(`time-${item.id}`);
                if(!el) return;
                if(timeFormatState === "absolute") {
                    el.innerText = new Date(item.ts).toLocaleTimeString();
                } else if(timeFormatState === "relative") {
                    let diff = Math.floor((Date.now() - item.ts) / 1000);
                    el.innerText = diff < 60 ? "Just now" : `${Math.floor(diff/60)}m ago`;
                } else { el.innerText = `UX:${item.ts}`; }
            });
        }

        // 10. MEDIA DRAWER FILE ARCHIVE UTILITY HOOKS
        function toggleArchiveShelf() {
            const shelf = document.getElementById('archive-shelf');
            shelf.classList.toggle('open');
        }

        function pushToArchiveIndex(src) {
            const container = document.getElementById('archive-items-container');
            const img = document.createElement('img');
            img.src = src; img.className = 'archive-item';
            img.onclick = () => window.open(src, '_blank');
            container.appendChild(img);
        }

        // 11. ADMINISTRATIVE SECURITY MATRIX PANELS
        function toggleAdminLock() {
            let currentText = document.getElementById('btn-admin-lock').innerText;
            let targetState = (currentText === "LOCK NODE");
            ws.send(JSON.stringify({ type: 'admin_lock', lockState: targetState }));
            document.getElementById('btn-admin-lock').innerText = targetState ? "UNLOCK NODE" : "LOCK NODE";
        }

        function executeKickCall(userTag) {
            if(isAdminNode && confirm(`Sever complete connection tokens for [${userTag}]?`)) {
                ws.send(JSON.stringify({ type: 'admin_kick', targetUser: userTag }));
            }
        }

        // 12. DRAWING PRIMITIVES & FRONTEND LOGS UI
        function renderMsg(msgId, sender, avatarUrl, content, type, format, timestamp) {
            const wrap = document.createElement('div'); wrap.className = `msg-wrap ${type}`; wrap.id = `msg-${msgId}`;
            let displayHtml = format === 'text' ? content : `<img src="${content}" class="media-render">`;
            let nameColor = (type === 'self') ? '#ffffff' : getMatteColor(sender);
            
            wrap.innerHTML = `
                <img src="${avatarUrl}" class="msg-avatar" onclick="executeKickCall('${sender}')" style="cursor:${isAdminNode?'pointer':'default'}">
                <div class="msg-content">
                    <span class="sender-tag" style="color:${nameColor}">${sender}</span>
                    <div class="msg-box">
                        ${displayHtml}
                        <div class="del-btn" onclick="requestDelete('${msgId}', ${type === 'self'})">🗑️</div>
                    </div>
                    <span class="timestamp-tag" id="time-${msgId}" onclick="toggleTimeFormat(this, ${timestamp})">${new Date(timestamp).toLocaleTimeString()}</span>
                </div>
            `;
            const box = document.getElementById('chat-box');
            box.insertBefore(wrap, document.getElementById('typing-indicator'));
            box.scrollTop = box.scrollHeight;

            messageTimeRegistry.push({ id: msgId, ts: timestamp });
            if(format !== 'text') pushToArchiveIndex(content);
        }

        function renderSysMsg(text) {
            const div = document.createElement('div'); div.className = 'msg-sys'; div.innerText = `— ${text} —`;
            const box = document.getElementById('chat-box');
            box.insertBefore(div, document.getElementById('typing-indicator'));
            box.scrollTop = box.scrollHeight;
        }

        function clearMainFeed() {
            document.getElementById('chat-box').innerHTML = '<div id="typing-indicator"></div>';
            document.getElementById('archive-items-container').innerHTML = '';
            messageTimeRegistry = [];
        }

        // PROFILE AND COOKIE UTILITIES 
        function updateProfileUI() {
            document.getElementById('my-name').innerText = myAlias;
            document.getElementById('my-avatar').src = myAvatarUrl;
            document.getElementById('google-login-container').style.display = "none";
            document.getElementById('profile-display').style.display = "flex";
            renderPastChats(); 
        }

        window.handleGoogleLogin = (response) => {
            const payload = JSON.parse(decodeURIComponent(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
            myAlias = payload.name; myAvatarUrl = payload.picture; myGoogleId = payload.sub;
            localStorage.setItem('wl_alias', myAlias); localStorage.setItem('wl_avatar', myAvatarUrl);
            localStorage.setItem('wl_google_id', myGoogleId);
            updateProfileUI();
        };

        function toggleEdit() {
            const portal = document.getElementById('edit-portal');
            portal.style.display = portal.style.display === "block" ? "none" : "block";
            document.getElementById('edit-name').value = myAlias; document.getElementById('edit-dp').value = myAvatarUrl;
        }

        function saveProfile() {
            myAlias = document.getElementById('edit-name').value || myAlias;
            myAvatarUrl = document.getElementById('edit-dp').value || myAvatarUrl;
            preferredChime = document.getElementById('setting-chime').value;
            localStorage.setItem('wl_alias', myAlias); localStorage.setItem('wl_avatar', myAvatarUrl);
            localStorage.setItem('wl_chime', preferredChime);
            updateProfileUI(); toggleEdit();
        }

        function logout() { localStorage.clear(); location.reload(); }
        function leaveRoom() { location.reload(); }

        function saveRoomToHistory(code, pass) {
            if (!code || !pass) return;
            const key = `wl_past_chats_${myGoogleId}`;
            let chats = JSON.parse(localStorage.getItem(key)) || [];
            chats = chats.filter(c => c.code !== code); 
            chats.unshift({ code, pass, timestamp: Date.now() }); 
            localStorage.setItem(key, JSON.stringify(chats));
            renderPastChats();
        }

        function removeRoomFromHistory(code) {
            const key = `wl_past_chats_${myGoogleId}`;
            let chats = JSON.parse(localStorage.getItem(key)) || [];
            chats = chats.filter(c => c.code !== code);
            localStorage.setItem(key, JSON.stringify(chats));
            renderPastChats();
        }

        function renderPastChats() {
            const key = `wl_past_chats_${myGoogleId}`;
            const chats = JSON.parse(localStorage.getItem(key)) || [];
            const container = document.getElementById('past-chats-container');
            container.innerHTML = '';
            if (chats.length === 0) {
                container.innerHTML = '<div style="font-size:11px; color:#444; text-align:center; padding:10px;">Zero structural references archived under this user token.</div>';
                return;
            }
            chats.forEach(chat => {
                const item = document.createElement('div'); item.className = 'past-chat-item';
                item.innerHTML = `<div><span style="color:#fff; font-family:monospace;">ID: ${chat.code}</span><span style="color:#444; margin-left:10px; font-size:11px;">PIN: ${chat.pass}</span></div><span style="color:var(--accent); font-size:10px; font-weight:bold;">RE-LINK</span>`;
                item.onclick = () => {
                    document.getElementById('join-code').value = chat.code; document.getElementById('join-pass').value = chat.pass;
                    document.getElementById('btn-join').click();
                };
                container.appendChild(item);
            });
        }

        function requestClearHistory() {
            if (confirm("TERMINATE RECORDED INSTANCES?\n[OK] Clear Globally across Database\n[Cancel] Flush Local Terminal Frame Only")) {
                ws.send(JSON.stringify({ type: 'clear_history' }));
                clearMainFeed();
            } else { clearMainFeed(); renderSysMsg("Local buffer monitor cleared."); }
        }

        function requestDelete(msgId, isSelf) {
            if (isSelf) {
                if(confirm("Burn data packet from cloud records?")) {
                    ws.send(JSON.stringify({ type: 'delete_msg', msgId: msgId }));
                }
                const target = document.getElementById(`msg-${msgId}`); if(target) target.remove();
            } else { if(confirm("Prune trace from personal monitor view?")) document.getElementById(`msg-${msgId}`).remove(); }
        }

        // INTERACTION COMPILATION INPUT MANAGEMENT
        document.getElementById('chat-input').oninput = () => {
            if(activeRoom) {
                ws.send(JSON.stringify({ type: 'typing', isTyping: true }));
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { ws.send(JSON.stringify({ type: 'typing', isTyping: false })); }, 1500);
            }
        };

        // Click actions trigger box triggers
        document.getElementById('btn-send').onclick = () => sendChat();
        document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendChat(); };

        // Setting room connections hooks
        document.getElementById('btn-create').onclick = () => {
            const pass = document.getElementById('create-pass').value;
            if(pass.length !== 4) { alert("PIN must be exactly 4 digits"); return; }
            ws.send(JSON.stringify({ type: 'create_room', password: pass, username: myAlias, avatar: myAvatarUrl, adminToken: myAdminToken }));
        };

        document.getElementById('btn-join').onclick = () => {
            const code = document.getElementById('join-code').value.trim();
            const pass = document.getElementById('join-pass').value;
            if(!code || pass.length !== 4) { alert("Invalid Room credentials configuration"); return; }
            ws.send(JSON.stringify({ type: 'join_room', roomCode: code, password: pass, username: myAlias, avatar: myAvatarUrl, adminToken: myAdminToken }));
        };

        document.getElementById('btn-attach').onclick = () => document.getElementById('media-upload').click();
        document.getElementById('media-upload').onchange = (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            
            document.getElementById('upload-progress').style.width = "20%";
            reader.onprogress = (evt) => {
                if (evt.lengthComputable) {
                    let percentComplete = (evt.loaded / evt.total) * 100;
                    document.getElementById('upload-progress').style.width = `${percentComplete}%`;
                }
            };

            reader.readAsDataURL(file);
            reader.onloadend = () => {
                const msgId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
                const ts = Date.now();
                let packet = { type: 'media', msgId, username: myAlias, avatar: myAvatarUrl, mimeType: file.type, data: reader.result, adminToken: myAdminToken };
                if(isBurnActive) packet.burnDuration = 10;

                transmitPacket(packet);
                renderMsg(msgId, 'YOU', myAvatarUrl, reader.result, 'self', file.type, ts);
                if(isBurnActive) executeLocalBurn(msgId, 10, ts);

                setTimeout(() => { document.getElementById('upload-progress').style.width = "0%"; }, 1000);
            };
        };
// Initialize Runtime Loops: Always keep Google Login active!
if(localStorage.getItem('wl_alias')) {
    updateProfileUI();
} else {
    // If they aren't logged in, make sure the Google button container is completely visible
    document.getElementById('google-login-container').style.display = "block";
}

connectSocket();
checkURLParameters();
    </script>
</body>
